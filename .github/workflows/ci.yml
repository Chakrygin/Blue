name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore /p:ContinuousIntegrationBuild=true

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4

      - name: Validate tag
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected v<major>.<minor> or v<major>.<minor>.<patch>)"
            exit 1
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore /p:Version=${{ steps.version.outputs.version }} /p:ContinuousIntegrationBuild=true
      - run: dotnet pack -c Release --no-build -o artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: Chakrygin

      - name: NuGet push
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
